[config]
    available-indices =  [
        "rating", "transactions", "blocks", "validators", "miniblocks", "rounds", "accounts", "accountshistory",
        "receipts", "scresults", "accountsesdt", "accountsesdthistory", "epochinfo", "scdeploys", "tokens", "tags",
        "logs", "delegators", "operations", "esdts", "values", "events", "executionresults",
        "drwa-denials", "drwa-identities", "drwa-holder-compliance", "drwa-attestations", "drwa-token-policies",
        "drwa-control-events", "mrv-anchored-proofs"
    ]
    use-templates-from-files = true
    [config.policies]
        enabled = true
        indices-with-policy = ["rating", "transactions", "blocks", "validators", "miniblocks", "rounds", "accounts",
            "accountshistory", "receipts", "scresults", "accountsesdt", "accountsesdthistory", "epochinfo",
            "scdeploys", "tokens", "tags", "logs", "delegators", "operations", "esdts", "events", "executionresults"]
    [config.drwa]
        # Authorized smart-contract emitters for DRWA-specific event materialization.
        # Empty means DRWA event extraction fails closed.
        authorized-emitters = []
    [config.mrv]
        # Authorized smart-contract emitters for MRV-specific event materialization.
        # Empty means MRV event extraction fails closed.
        authorized-emitters = []
    [config.address-converter]
        length = 32
        type = "bech32"
        prefix = "erd"
    [config.validator-keys-converter]
        length = 96
        type = "hex"
    [config.hasher]
        type = "blake2b"
    [config.marshaller]
        type = "gogo protobuf"
    [config.economics]
        denomination = 18
    [config.logs]
        log-file-life-span-in-mb = 1024 # 1GB
        log-file-life-span-in-sec = 432000 # 5 days
        log-file-prefix = "elastic-indexer"
        logs-path = "logs"
